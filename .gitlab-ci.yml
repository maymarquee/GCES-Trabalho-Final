include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - build
  - lint
  - test
  - security

default:
  image: node:18-alpine

build:
  stage: build
  script:
    - cd server && npm ci
  artifacts:
    paths:
      - server/node_modules/
    expire_in: 1 hour

lint:back:
  stage: lint
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm run lint:back

lint:front:
  stage: lint
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm run lint:front

test:unit:
  stage: test
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm test

test:fuzz:
  stage: test
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm run test:fuzz

semgrep-sast:
  stage: security
  variables:
    SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, node_modules"

sca:npm-audit:
  stage: security
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm audit --audit-level=high --json > npm-audit-report.json || (cat npm-audit-report.json && exit 1)
  artifacts:
    when: always
    paths:
      - server/npm-audit-report.json
    expire_in: 1 week
  allow_failure: false
