include:
  - template: Security/SAST.gitlab-ci.yml

stages:
  - build
  - lint
  - test
  - security
  - quality
  - infra
  - release

default:
  image: node:18-alpine

build:
  stage: build
  script:
    - cd server && npm ci
  artifacts:
    paths:
      - server/node_modules/
    expire_in: 1 hour

lint:back:
  stage: lint
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm run lint:back

lint:front:
  stage: lint
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm run lint:front

test:unit:
  stage: test
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm run test:coverage
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    paths:
      - server/coverage/
    expire_in: 1 hour

test:fuzz:
  stage: test
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm run test:fuzz

semgrep-sast:
  stage: security
  variables:
    SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, node_modules"

sonarcloud:
  stage: quality
  image: sonarsource/sonar-scanner-cli:latest
  needs:
    - job: test:unit
      artifacts: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner -Dsonar.qualitygate.wait=true

sca:npm-audit:
  stage: security
  needs:
    - job: build
      artifacts: true
  script:
    - cd server && npm audit --audit-level=high --json > npm-audit-report.json || (cat npm-audit-report.json && exit 1)
  artifacts:
    when: always
    paths:
      - server/npm-audit-report.json
    expire_in: 1 week
  allow_failure: false

k8s:validate:
  stage: infra
  image: alpine/k8s:1.30.2
  script:
    - kubectl kustomize k8s/

terraform:validate:
  stage: infra
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  script:
    - cd terraform
    - terraform fmt -check
    - terraform init -backend=false
    - terraform validate

release:images:
  stage: release
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f Dockerfile.prod -t "$CI_REGISTRY_IMAGE/mkjs-app:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/mkjs-app:latest" .
    - docker build -f nginx/Dockerfile -t "$CI_REGISTRY_IMAGE/mkjs-nginx:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE/mkjs-nginx:latest" .
    - docker push "$CI_REGISTRY_IMAGE/mkjs-app:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/mkjs-app:latest"
    - docker push "$CI_REGISTRY_IMAGE/mkjs-nginx:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/mkjs-nginx:latest"
