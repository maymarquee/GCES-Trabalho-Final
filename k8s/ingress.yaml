# HTTP-only entry point for this phase. Phase 10 attaches TLS (cert-manager) to this
# same Ingress. Long proxy timeouts keep Socket.io websocket connections alive.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mkjs
  namespace: mkjs
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: mkjs.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
