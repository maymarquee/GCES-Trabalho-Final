# Headless service: gives the StatefulSet pod a stable DNS name
# (postgres-0.postgres.mkjs.svc.cluster.local) and backs PGHOST=postgres.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mkjs
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
